<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Inspired by Meetup</title>
    <link rel="stylesheet" href="../add-event/css/style.css">
    <link rel="stylesheet" href="../home/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="container">
        <h1 class="logo-text">Hafla</h1>
        <nav class="one">
          <a href="/home" class="active">View Events</a>
          <a href="/add-event">Add Event</a>
          <a href="#">My tickets</a>
          <a href="#">My events</a>
        </nav>
        <button class="logout" id="logout">Logout</button>
        <div class="user-card" id="user-card"></div>
        
        <div class="menu-icon" >
          <i class="fa-solid fa-bars" id="menu-icon"></i>
          <div class="menu-content" id="menu-content">
            <div class="top-links">
              <h2>Menu</h2>
              <div class="small-user-card" id="small-user-card">
                <img class="small-user-img" src="../about/image2.jpg" alt="user img">
                <p class="small-user-greet">Hello, user</p>
              </div>
            </div>
            <div class="nav-links">
              <a href="/home" class="active">View Events</a>
              <a href="/add-event">Add Event</a>
              <a href="/tickets">My tickets</a>
              <a href="/events">My events</a>
            </div>
            <button class="small-login" id="small-login">Logout</button>
          </div>
        </div>
      </header>
    </header>
    <main class="container">
        <section id="event-form-section">
            <h2>Create a New Event</h2>
            <form id="eventForm">
                <div class="form-group">
                    <label for="title">Event Title</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="event_date">Date</label>
                        <input type="date" id="event_date" name="event_date" required>
                    </div>
                    <div class="form-group">
                        <label for="event_time">Time</label>
                        <input type="time" id="event_time" name="event_time" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="duration">Duration (days)</label>
                        <input type="number" id="duration" name="duration" required>
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="image">Event Image</label>
                    <input type="file" id="image" name="image" accept="image/*" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="categories" name="category"  required>
                            <option value="">Select Category</option>
                            
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="max_attendees">Max Attendees</label>
                        <input type="number" id="max_attendees" name="max_attendees" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="ticket_price">Ticket Price (KES)</label>
                        <input type="number" id="ticket_price" name="ticket_price" step="0.01" required>
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="is_featured" name="is_featured">
                        <label for="is_featured">Featured Event</label>
                    </div>
                </div>
               
                <button type="submit">Create Event</button>
            </form>
        </section>
        <div id="statusMessage"></div>
       
    </main>
    <script type="module" src="../add-event/js/script.js"></script>
</body>
</html>
